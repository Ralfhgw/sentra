persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# Standard MQTT Listener (öffnet Port 1883)
listener 1883 0.0.0.0
allow_anonymous true # Zum Testen ok, später mit Passwort absichern!

# Pfad zur eben erstellten Passwort-Datei
# password_file /mosquitto/config/passwd

# WebSocket Listener (öffnet Port 9001)
# listener 9001
# protocol websockets